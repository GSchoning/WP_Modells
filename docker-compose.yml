# docker-compose.yml — local development for the Precipice POC.
#
# Usage:
#   docker compose run --rm app                       # run the pipeline
#   docker compose run --rm app bash                  # shell inside the container
#   docker compose run --rm --service-ports notebook  # JupyterLab on :8888

services:
  app:
    build: .
    image: precipice-poc:latest
    volumes:
      # User-supplied inputs (the repo uses ./Data with a capital D).
      - ./Data:/app/Data
      # Outputs and reports — writable from inside the container.
      - ./outputs:/app/outputs
      - ./reports:/app/reports
      # Live source mount so edits on the host take effect without rebuilds.
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PYTHONUNBUFFERED=1

  api:
    extends:
      service: app
    command: python -m src.cli serve --config config.yaml
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend

  notebook:
    extends:
      service: app
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --ServerApp.token=''
        --ServerApp.password=''
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
